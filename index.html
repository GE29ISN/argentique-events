<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L'Argentique Events - Gestion</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <img src="logo.png" alt="Logo" class="login-logo">
      <h1>L'Argentique Events</h1>
      <p class="login-subtitle">Gestion de stock & devis</p>
      <form id="login-form">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Identifiant</label>
          <input type="text" id="login-username" placeholder="votre identifiant" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Mot de passe</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <div id="login-error" class="login-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fas fa-sign-in-alt"></i> Se connecter
        </button>
      </form>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="logo.png" alt="Logo" class="sidebar-logo">
        <span class="sidebar-title">L'Argentique</span>
      </div>
      <ul class="sidebar-menu">
        <li><a href="#" onclick="navigate('stock')" id="nav-stock" class="nav-item active">
          <i class="fas fa-boxes"></i><span>Stock</span>
        </a></li>
        <li><a href="#" onclick="navigate('devis')" id="nav-devis" class="nav-item">
          <i class="fas fa-file-invoice"></i><span>Devis</span>
        </a></li>
        <li><a href="#" onclick="navigate('calendrier')" id="nav-calendrier" class="nav-item">
          <i class="fas fa-calendar-alt"></i><span>Calendrier</span>
        </a></li>
        <li><a href="#" onclick="navigate('logs')" id="nav-logs" class="nav-item">
          <i class="fas fa-history"></i><span>Logs</span>
        </a></li>
        <li><a href="#" onclick="navigate('parametres')" id="nav-parametres" class="nav-item">
          <i class="fas fa-cog"></i><span>Paramètres</span>
        </a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-info">
          <i class="fas fa-user-circle"></i>
          <span id="user-display"></span>
        </div>
        <button onclick="logout()" class="btn-logout">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="main-content">
      <div id="page-stock" class="page active"></div>
      <div id="page-devis" class="page hidden"></div>
      <div id="page-calendrier" class="page hidden"></div>
      <div id="page-logs" class="page hidden"></div>
      <div id="page-parametres" class="page hidden"></div>
    </main>
  </div>

  <!-- MODALS -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>
  <div id="modal" class="modal hidden"></div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="auth.js"></script>
  <script src="sheets.js"></script>
  <script src="app.js"></script>
  <script src="pdf.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Auth.init();

      // Si déjà connecté (session active)
      if (Auth.isLoggedIn()) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('user-display').textContent = Auth.getFullName();
        if (typeof APP !== 'undefined' && APP.init) {
          APP.init();
        }
      }

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');

        errorEl.classList.add('hidden');
        errorEl.textContent = '';

        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';

        const result = await Auth.login(username, password);

        if (result.success) {
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
          document.getElementById('user-display').textContent = Auth.getFullName();
          if (typeof APP !== 'undefined' && APP.init) {
            APP.init();
          }
        } else {
          errorEl.textContent = result.message;
          errorEl.classList.remove('hidden');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
        }
      });
    });

    function logout() {
      Auth.logout();
      document.getElementById('app').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('login-username').value = '';
      document.getElementById('login-password').value = '';
      document.getElementById('login-error').classList.add('hidden');
    }

    function navigate(page) {
      // Masquer toutes les pages
      document.querySelectorAll('.page').forEach(p => {
        p.classList.add('hidden');
        p.classList.remove('active');
      });

      // Retirer active sur tous les nav-items
      document.querySelectorAll('.nav-item').forEach(n => {
        n.classList.remove('active');
      });

      // Afficher la page cible
      const pageEl = document.getElementById('page-' + page);
      if (pageEl) {
        pageEl.classList.remove('hidden');
        pageEl.classList.add('active');
      }

      // Activer le bon nav-item
      const navEl = document.getElementById('nav-' + page);
      if (navEl) {
        navEl.classList.add('active');
      }

      // Appeler le rendu de la page si APP le gère
      if (typeof APP !== 'undefined' && APP.renderPage) {
        APP.renderPage(page);
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal-overlay').classList.add('hidden');
    }
  </script>

</body>
</html>
